<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Современные Ноды</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Панель управления -->
    <div id="top-panel">
        <button class="panel-btn" id="btn-mode" title="Переключить режим">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 9h-2V7h-2v5H6v2h2v5h2v-5h2v-2zm4 5h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            <span id="mode-text">Режим: Nodes</span>
        </button>
        <div class="panel-divider"></div>
        <button class="panel-btn" id="btn-focus" title="Найти все заметки">
            <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
            Фокус
        </button>
        <button class="panel-btn" id="btn-theme" title="Переключить тему">
            <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
            Тема
        </button>
        <button class="panel-btn" id="btn-export" title="Сохранить файл">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            Экспорт JSON
        </button>
    </div>

    <!-- Адаптивная сетка -->
    <canvas id="grid-canvas"></canvas>

    <!-- Холст для нод и связей -->
    <div id="workspace">
        <svg id="svg-layer"></svg>
        <div id="nodes-container"></div>
    </div>

    <!-- Лаборатория (боковая панель) -->
    <div id="lab-panel">
        <div class="lab-header">Лаборатория ИИ</div>
        <div class="lab-content">
            <label class="lab-label" for="api-key">Groq API Key</label>
            <input type="password" id="api-key" class="lab-input" placeholder="gsk_...">

            <label class="lab-label" for="ai-prompt">Промпт / Задача</label>
            <textarea id="ai-prompt" class="lab-textarea" placeholder="Что сделать с выбранной последовательностью нод? (например: 'сделай из этого историю' или 'дополни детали')"></textarea>

            <button id="btn-run-ai" class="lab-btn">Запустить</button>

            <div id="ai-status" class="lab-status"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
