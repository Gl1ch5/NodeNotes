<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Современные Ноды</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <!-- Панель управления -->
    <div id="top-panel">
        <button class="panel-btn" id="btn-mode" title="Переключить режим">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 9h-2V7h-2v5H6v2h2v5h2v-5h2v-2zm4 5h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            <span id="mode-text">Режим: Nodes</span>
        </button>
        <div class="panel-divider"></div>
        <button class="panel-btn" id="btn-focus" title="Найти все заметки">
            <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
            Фокус
        </button>
        <button class="panel-btn" id="btn-group" title="Сгруппировать выделенные">
            <svg viewBox="0 0 24 24"><path d="M22 13h-8v-2h8v2zm0-6h-8v2h8V7zm-8 10h8v-2h-8v2zm-2-8v6c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V9c0-1.1.9-2 2-2h6c1.1 0 2 .9 2 2z"/></svg>
            <span class="group-text">Сгруппировать</span>
        </button>
        <button class="panel-btn" id="btn-theme" title="Переключить тему">
            <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
            Тема
        </button>
        <button class="panel-btn" id="btn-export" title="Сохранить файл">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            Экспорт JSON
        </button>
    </div>

    <!-- Адаптивная сетка -->
    <canvas id="grid-canvas"></canvas>

    <!-- Холст для нод и связей -->
    <div id="workspace">
        <svg id="svg-layer"></svg>
        <div id="nodes-container"></div>
    </div>

    <!-- Меню Лаборатории (Плавающее) -->
    <div id="lab-menu" style="display: none; position: absolute; left: 20px; top: 80px; z-index: 1000; background: var(--panel-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--panel-border); border-radius: 12px; padding: 12px; width: 250px; flex-direction: column; gap: 10px; box-shadow: 0 4px 24px var(--node-shadow); max-height: calc(100vh - 100px); overflow-y: auto;">
        <div style="font-weight: 600; font-size: 14px; margin-bottom: 5px;">Лаборатория</div>

        <div style="display: flex; flex-direction: column; gap: 4px;">
            <label style="font-size: 12px; color: var(--text-muted);">Groq API Key</label>
            <input type="password" id="lab-api-key" style="width: 100%; background: var(--input-bg); color: var(--text-main); border: 1px solid var(--node-border); border-radius: 6px; padding: 8px; font-size: 12px;" placeholder="gsk_...">
        </div>

        <div style="display: flex; flex-direction: column; gap: 4px;">
            <label style="font-size: 12px; color: var(--text-muted);" for="lab-model-select">Модель:</label>
            <select id="lab-model-select" style="width: 100%; background: var(--input-bg); color: var(--text-main); border: 1px solid var(--node-border); border-radius: 6px; padding: 8px; font-size: 12px;">
                <option value="llama3-8b-8192">llama3-8b-8192 (Default)</option>
            </select>
            <button id="btn-fetch-models" class="panel-btn" style="width: 100%; justify-content: center; background: var(--selection); color: var(--bg-color); padding: 8px; font-size: 11px;">Загрузить Модели</button>
        </div>

        <div style="height: 1px; background: var(--node-border); margin: 5px 0;"></div>

        <div style="font-weight: 500; font-size: 12px; color: var(--text-muted);">Добавить ноду:</div>
        <button id="btn-add-input-node" class="panel-btn" style="width: 100%; justify-content: center; background: var(--grid-main);">+ Input Notes Node</button>
        <button id="btn-add-story-node" class="panel-btn" style="width: 100%; justify-content: center; background: var(--grid-main);">+ Story Generator Node</button>

        <div style="height: 1px; background: var(--node-border); margin: 5px 0;"></div>

        <div style="display: flex; flex-direction: column; gap: 4px;">
            <label style="font-size: 12px; color: var(--text-muted);">Загрузить Мод (.js)</label>
            <input type="file" id="lab-mod-upload" accept=".js" style="font-size: 10px; width: 100%; color: var(--text-main);">
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
